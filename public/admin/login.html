<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Админка</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h1 class="text-xl font-bold mb-6 text-center">Админ-панель</h1>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Логин</label>
                <input type="text" name="username" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <p id="error" class="text-red-600 text-sm hidden"></p>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg">Войти</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const errEl = document.getElementById('error');
            errEl.classList.add('hidden');
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: fd.get('username'),
                    password: fd.get('password')
                })
            });
            if (res.ok) {
                window.location.href = '/admin';
            } else {
                const data = await res.json();
                errEl.textContent = data.error || 'Ошибка входа';
                errEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
